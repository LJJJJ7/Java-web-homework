<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            /* 背景*/
            background: url("兰理图书馆.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative; 
        }
        /* 左上角校徽样式 */
        .school-logo {
            position: absolute;
            top: 4vw; 
            left: 4vw; 
            z-index: 3; 
            max-width: 200px; 
            width: 18vw; 
            min-width: 80px;
        }
        .school-logo img {
            width: 100%; 
            height: auto; 
        }
        /* 登录/注册表单容器 */
        .form-box {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            width: 420px;
            display: flex;
            flex-direction: column;
        }
        /* 标题样式 */
        .form-box h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
        }
        /* 个人标识信息  */
        .user-info {
            text-align: center;
            color: #666; 
            font-size: 14px;
            padding: 8px 0;
            margin-top: 10px; 
            margin-bottom: 0; 
            border-top: 1px solid #eee; 
            font-family: "SimHei", sans-serif; 
        }
        /* 表单组样式 */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            color: #2c3e50;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 14px;
        }
        /* 性别和爱好行内布局 */
        .inline-group {
            display: flex;
            gap: 40px; 
            align-items: center;
            flex-wrap: wrap;
            padding: 5px 0; 
        }
        /* 单选/复选框选项样式 - 核心修改 */
        .inline-group .option-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            color: #34495e;
            gap: 8px; 
        }
        /* 调整单选/复选框的位置和大小 */
        .inline-group input[type="radio"],
        .inline-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            padding: 0;
            border: none;
            accent-color: #3498db;
        }
        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #2980b9;
        }
        /* 页面切换链接 */
        .link-box {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 5px; 
            font-size: 14px;
        }
        .link-box a {
            color: #3498db;
            text-decoration: none;
        }
        .link-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="school-logo">
        <img src="兰州理工大学校徽.png" alt="兰州理工大学校徽">
    </div>

    <div class="mask"></div>
    <!-- 注册页面 -->
    <div class="form-box" id="registerBox">
        <h2>用户注册</h2>
        <form>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" placeholder="请再次输入密码" required>
            </div>
            <div class="form-group">
                <label>性别</label>
                <div class="inline-group">
                    <div class="option-item">
                        <input type="radio" name="gender" value="male" id="male">
                        <label for="male">男</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="gender" value="female" id="female">
                        <label for="female">女</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>爱好</label>
                <div class="inline-group">
                    <div class="option-item">
                        <input type="checkbox" name="hobby" value="read" id="read">
                        <label for="read">阅读</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" name="hobby" value="sport" id="sport">
                        <label for="sport">运动</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" name="hobby" value="music" id="music">
                        <label for="music">音乐</label>
                    </div>
                    <div class="option-item">
                        <input type="checkbox" name="hobby" value="other" id="other">
                        <label for="other">其他</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="请输入邮箱地址" required>
            </div>
            <button type="submit" class="btn">注册</button>
        </form>
        <div class="link-box">
            已有账号？<a href="#login" onclick="toggleForm()">去登录</a>
        </div>
        <div class="user-info">
            学号：230162402023　|　姓名：刘晶晶
        </div>
    </div>


    <div class="form-box" id="loginBox" style="display: none;">
        <h2>用户登录</h2>
        <form>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="link-box">
            没有账号？<a href="#register" onclick="toggleForm()">去注册</a>
        </div>
        <div class="user-info">
            学号：230162402023　|　姓名：刘晶晶
        </div>
    </div>

    <script>
        // 切换登录/注册页面
        function toggleForm() {
            const registerBox = document.getElementById('registerBox');
            const loginBox = document.getElementById('loginBox');
            if (registerBox.style.display === 'none') {
                registerBox.style.display = 'block';
                loginBox.style.display = 'none';
            } else {
                registerBox.style.display = 'none';
                loginBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
